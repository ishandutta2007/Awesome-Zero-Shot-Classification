<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="50%" stop-color="#1E1B4B" />
      <stop offset="100%" stop-color="#311042" />
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA" />
      <stop offset="50%" stop-color="#F472B6" />
      <stop offset="100%" stop-color="#38BDF8" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg-grad)" />

  <circle cx="950" cy="100" r="180" fill="url(#accent-grad)" />
  <circle cx="200" cy="300" r="150" fill="url(#accent-grad)" />

  <g stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5">
    <line x1="100" y1="100" x2="300" y2="80" />
    <line x1="300" y1="80" x2="450" y2="180" />
    <line x1="450" y1="180" x2="250" y2="280" />
    <line x1="250" y1="280" x2="100" y2="100" />
    <line x1="300" y1="80" x2="250" y2="280" />

    <line x1="900" y1="80" x2="1050" y2="150" />
    <line x1="1050" y1="150" x2="1000" y2="300" />
    <line x1="1000" y1="300" x2="850" y2="220" />
    <line x1="850" y1="220" x2="900" y2="80" />
    <line x1="1050" y1="150" x2="850" y2="220" />
  </g>

  <g fill="#A78BFA" opacity="0.3" filter="url(#glow)">
    <circle cx="100" cy="100" r="6" />
    <circle cx="300" cy="80" r="8" fill="#F472B6" />
    <circle cx="450" cy="180" r="5" fill="#38BDF8" />
    <circle cx="250" cy="280" r="7" />
    
    <circle cx="900" cy="80" r="7" fill="#38BDF8" />
    <circle cx="1050" cy="150" r="6" />
    <circle cx="1000" cy="300" r="9" fill="#F472B6" />
    <circle cx="850" cy="220" r="5" />
  </g>
  
  <g fill="#ffffff" opacity="0.8">
    <circle cx="100" cy="100" r="3" />
    <circle cx="300" cy="80" r="4" />
    <circle cx="450" cy="180" r="2.5" />
    <circle cx="250" cy="280" r="3.5" />
    
    <circle cx="900" cy="80" r="3.5" />
    <circle cx="1050" cy="150" r="3" />
    <circle cx="1000" cy="300" r="4.5" />
    <circle cx="850" cy="220" r="2.5" />
  </g>

  <g font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" text-anchor="middle">
    <text x="600" y="140" fill="#38BDF8" font-size="20" letter-spacing="6" opacity="0.9">CURATED AWESOME LIST</text>
    <text x="600" y="215" fill="url(#text-grad)" font-size="54" filter="url(#glow)" letter-spacing="1">ZERO-SHOT CLASSIFICATION</text>
    <text x="600" y="275" fill="#E2E8F0" font-size="18" font-weight="400" letter-spacing="1" opacity="0.8">Evolution • Variants • Paradigms • Implementations</text>
  </g>
</svg>
